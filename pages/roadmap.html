
<!DOCTYPE html>
<html>
<head>
  <title>Roadmap</title>
  <link rel="stylesheet" href="../css/style.css">
</head>

<body>

<div class="header">
  <span onclick="history.back()">←</span>
  <h3>Roadmap</h3>
</div>

<div class="container">
  <div id="roadmap"></div>
</div>

<script>
fetch("../data/roadmap.json")
  .then(res => res.json())
  .then(data => {
    let container = document.getElementById("roadmap");

    data.phases.forEach(phase => {
      let html = `
        <div class="card">
          <h3>${phase.title} (${phase.days} days)</h3>
          <ul>
      `;

      phase.tasks.forEach(task => {
        html += `<li>${task}</li>`;
      });

      html += "</ul></div>";

      container.innerHTML += html;
    });
  });
</script>

</body>
</html>
