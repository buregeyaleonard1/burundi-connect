<h2>Add Product</h2>

<form onsubmit="addProduct(event)">
  <input type="text" id="seller" placeholder="Seller Name" required><br><br>

  <input type="text" id="name" placeholder="Product Name" required><br><br>

  <input type="text" id="price" placeholder="Price" required><br><br>

  <input type="text" id="address" placeholder="Address" required><br><br>

  <select id="category">
    <option>Imodoka</option>
    <option>Ikinga</option>
    <option>Imoto</option>
    <option>Impuzu</option>
    <option>Ibirato</option>
    <option>Electronic</option>
    <option>Ibifungurwa</option>
    <option>Ibitungwa</option>
  </select><br><br>

  <input type="number" id="stock" placeholder="Stock" required><br><br>

  <input type="text" id="img1" placeholder="Image 1 URL"><br>
  <input type="text" id="img2" placeholder="Image 2 URL"><br>
  <input type="text" id="img3" placeholder="Image 3 URL"><br>
  <input type="text" id="img4" placeholder="Image 4 URL"><br><br>

  <button type="submit">Add Product</button>
</form>

<hr>

<div id="products"></div>

<script src="../js/app.js"></script>
<script>
  loadProducts();
</script>
