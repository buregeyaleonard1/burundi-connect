<div class="container">
  <div class="card">
    <h2>Add Product</h2>

    <form onsubmit="addProduct(event)">
      <input type="text" id="seller" placeholder="Seller Name" required>
      <input type="text" id="name" placeholder="Product Name" required>
      <input type="text" id="price" placeholder="Price" required>
      <input type="text" id="address" placeholder="Address" required>

      <select id="category">
        <option>Car</option>
        <optionBicle</option>
        <option>Motor</option>
        <option>Colds</option></option>
        <option>Chaos</option>
        <option>Electronic</option>
        <option>Ibifungurwa</option>
        <option>Ibitungwa</option>
      </select>

      <input type="number" id="stock" placeholder="Stock" required>

      <input type="text" id="img1" placeholder="Image 1 URL">
      <input type="text" id="img2" placeholder="Image 2 URL">
      <input type="text" id="img3" placeholder="Image 3 URL">
      <input type="text" id="img4" placeholder="Image 4 URL">

      <button type="submit">Add Product</button>
    </form>
  </div>
</div>
