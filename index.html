<!DOCTYPE html>
<html>
<head>
  <title>Roadmap</title>
  <style>
    body {
      font-family: Arial;
      padding: 20px;
      background: #f0f2f5;
    }

    .task {
      display: flex;
      justify-content: space-between;
      background: white;
      padding: 12px;
      margin: 8px 0;
      border-radius: 10px;
    }

    .loading {
      width: 16px;
      height: 16px;
      border: 3px solid #ccc;
      border-top: 3px solid green;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      100% { transform: rotate(360deg); }
    }
  </style>
</head>

<body>

<h2>📍 Roadmap</h2>
<div id="roadmap"></div>

<script>
fetch('data/roadmap.json')
  .then(res => res.json())
  .then(data => {
    const container = document.getElementById("roadmap");

    data.forEach(task => {
      const div = document.createElement("div");
      div.className = "task";

      let status = "";

      if (task.status === "pending") {
        status = '<span class="loading"></span>';
      } else {
        status = "✅";
      }

      div.innerHTML = `
        <span>Day ${task.day} - ${task.title}</span>
        <span>${status}</span>
      `;

      container.appendChild(div);
    });
  });
</script>

</body>
</html>
<nav>
  <a href="index.html">Home</a>
  <a href="roadmap.html">Roadmap</a>
</nav>
<div class="task">
  <span>Day 1 - Setup Project</span>
  <span class="status loading"></span>
</div>

<div class="task done">
  <span>Day 2 - Home UI</span>
  <span class="status">✅</span>
</div>
